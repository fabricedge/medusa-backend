services:
  - type: web
    name: medusa-backend
    runtime: node
    repo: https://github.com/fabricedge/medusa-backend
    region: oregon
    plan: starter
    buildCommand: pnpm install
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        value: https://your-storefront-url.com
      - key: ADMIN_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: PORT
        value: 9000
